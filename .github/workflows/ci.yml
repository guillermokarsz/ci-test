name: CI Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    services:
      postgres:
        image: postgres:9.6
        env:
          POSTGRES_DB: ci_test
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull PHP environment
        run: docker pull ghcr.io/guillermokarsz/ci-php74:latest

      - name: Run PHP syntax check
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            ghcr.io/guillermokarsz/ci-php74:latest \
            bash -c "find /app -name '*.php' -not -path '*/vendor/*' -print0 | xargs -0 -n1 php -l && echo 'All PHP files OK'"

      - name: Run PHPUnit
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}:/app \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_NAME=ci_test \
            -e DB_USER=ci_user \
            -e DB_PASSWORD=ci_password \
            ghcr.io/guillermokarsz/ci-php74:latest \
            phpunit --testdox /app/tests