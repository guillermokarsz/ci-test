name: CI Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:9.2
        env:
          POSTGRES_DB: ci_test
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build PHP environment
        run: docker build -t ci-php74 .

      - name: Run PHP syntax check
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            ci-php74 \
            find /app -name "*.php" -not -path "*/vendor/*" \
            -exec php -l {} \;

      - name: Run PHPUnit
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            ci-php74 \
            phpunit --testdox /app/tests